_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Job Apply
  description: AI job search agent — resumes, cover letters, interview prep, emails & tracking, all from Slack.
  background_color: "#1A3C5E"

features:
  bot_user:
    display_name: Job Apply
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  slash_commands:
    # Agent
    - command: /apply
      description: Generate a tailored resume, ATS resume & cover letter for a job posting
      usage_hint: (opens a form)
      should_escape: false
    - command: /aq
      description: Answer an application question using your resume & job description
      usage_hint: (opens a form)
      should_escape: false
    - command: /prep
      description: Generate an interview prep reference card for an upcoming round
      usage_hint: (opens a form)
      should_escape: false
    - command: /thankyou
      description: Generate a post-interview thank-you email
      usage_hint: (opens a form)
      should_escape: false
    - command: /optimize
      description: Refine an existing run’s documents from a prompt
      usage_hint: (opens a form)
      should_escape: false
    - command: /rescore
      description: Re-score resume/JD match for an application
      usage_hint: (opens a selector)
      should_escape: false
    - command: /runs
      description: List your recent agent run folders from Google Drive
      usage_hint: (no arguments)
      should_escape: false
    # Calendar
    - command: /cal-today
      description: Show today's calendar events
      usage_hint: (no arguments)
      should_escape: false
    - command: /cal-week
      description: Show calendar events in the next 7 days
      usage_hint: (no arguments)
      should_escape: false
    - command: /cal-add
      description: Add a calendar event with optional reminders and application link
      usage_hint: (opens a form)
      should_escape: false
    - command: /cal-view
      description: View full details of a calendar event
      usage_hint: (opens a selector)
      should_escape: false
    - command: /cal-delete
      description: Delete a calendar event (requires confirmation)
      usage_hint: (opens a selector)
      should_escape: false
    # Tracker
    - command: /tracker
      description: Show your application pipeline summary grouped by status
      usage_hint: (no arguments)
      should_escape: false
    - command: /track-list
      description: List your applications, optionally filtered by status
      usage_hint: "[status] e.g. interviewing, applied, rejected"
      should_escape: false
    - command: /track-view
      description: View full details of a specific application
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-add
      description: Add a new application — BrandFetch company search, all fields
      usage_hint: (opens a form)
      should_escape: false
    - command: /track-update
      description: "Two-step: select app then edit all fields pre-filled from current record"
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-note
      description: Add a comment or note to an application
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-delete
      description: Delete an application record (requires confirmation)
      usage_hint: (opens a selector)
      should_escape: false
    # Lookup
    - command: /company
      description: Search company info — name, domain, and description via BrandFetch
      usage_hint: "[company name] e.g. Salesforce"
      should_escape: false
    - command: /whoami
      description: Show your account details, role, and verification status
      usage_hint: (no arguments)
      should_escape: false
    # Profile
    - command: /profile-resume
      description: Instructions for uploading a new master resume (.docx) via DM
      usage_hint: (no arguments)
      should_escape: false
    - command: /profile-guide
      description: View and edit your profile & voice guide
      usage_hint: (opens a form)
      should_escape: false
    - command: /notifications
      description: View and toggle email notification preferences
      usage_hint: (no arguments)
      should_escape: false
    # System
    - command: /help
      description: Show the full Job Apply command reference
      usage_hint: (no arguments)
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands      # register slash commands
      - chat:write    # post messages and DMs
      - im:write      # open DM channels
      - im:history    # read DMs / Messages tab
      - im:read       # list DM channels
      - files:read    # download uploaded files (resume uploads via DM)

settings:
  # Socket Mode — requires SLACK_APP_TOKEN (xapp-...) set as a Fly secret.
  # No public request_url needed; all events are delivered over the WebSocket.
  socket_mode_enabled: true
  interactivity:
    is_enabled: true
  event_subscriptions:
    bot_events:
      - message.im        # receive DMs / Messages tab
      - app_home_opened   # render the App Home tab
  org_deploy_enabled: false
  token_rotation_enabled: false
