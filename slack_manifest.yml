_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Job Apply
  description: AI-powered job application agent — resumes, cover letters, interview prep, and application tracking, all from Slack.
  background_color: "#1A3C5E"
  long_description: |
    Job Apply lets you run the full application workflow without leaving Slack.

    🤖 Agent Runs
      /apply        — Generate tailored resume, ATS resume & cover letter
      /prep         — Generate an interview prep reference card
      /runs         — List your recent Drive run folders

    📅 Calendar
      /cal-today    — Show today's events
      /cal-week     — Show the next 7 days
      /cal-add      — Add a calendar event with reminders
      /cal-view     — View full details of an event
      /cal-delete   — Delete a calendar event (with confirmation)

    📋 Application Tracker
      /tracker      — Pipeline summary grouped by status
      /track-list   — List applications (optional: filter by status)
      /track-view   — View full details of an application
      /track-add    — Add application (BrandFetch search, all fields)
      /track-update — Two-step edit: all fields pre-filled
      /track-note   — Add a comment to an application
      /track-delete — Delete an application (with confirmation)

    🔍 Lookup & Info
      /company      — Search company info (logo, domain, description)
      /whoami       — Show your account details
      /activity     — Show your 10 most recent audit events

    👤 Profile
      /profile-name     — Update your display name
      /profile-email    — Change your email (triggers re-verification)
      /profile-password — Change your password
      /profile-resume   — Upload a new master resume (.docx)
      /profile-guide    — Edit your profile & voice guide

    🛠️ System
      /jobstatus    — Check API health
      /help         — Full command reference

features:
  bot_user:
    display_name: Job Apply
    always_online: true
  slash_commands:
    # Agent
    - command: /apply
      description: Generate a tailored resume, ATS resume & cover letter for a job posting
      usage_hint: (opens a form)
      should_escape: false
    - command: /prep
      description: Generate an interview prep reference card for an upcoming round
      usage_hint: (opens a form)
      should_escape: false
    - command: /runs
      description: List your recent agent run folders from Google Drive
      usage_hint: (no arguments)
      should_escape: false
    # Calendar
    - command: /cal-today
      description: Show today's calendar events
      usage_hint: (no arguments)
      should_escape: false
    - command: /cal-week
      description: Show calendar events in the next 7 days
      usage_hint: (no arguments)
      should_escape: false
    - command: /cal-add
      description: Add a calendar event with optional reminders and application link
      usage_hint: (opens a form)
      should_escape: false
    - command: /cal-view
      description: View full details of a calendar event
      usage_hint: (opens a selector)
      should_escape: false
    - command: /cal-delete
      description: Delete a calendar event (requires confirmation)
      usage_hint: (opens a selector)
      should_escape: false
    # Tracker
    - command: /tracker
      description: Show your application pipeline summary grouped by status
      usage_hint: (no arguments)
      should_escape: false
    - command: /track-list
      description: List your applications, optionally filtered by status
      usage_hint: "[status] e.g. interviewing, applied, rejected"
      should_escape: false
    - command: /track-view
      description: View full details of a specific application
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-add
      description: Add a new application — BrandFetch company search, all fields
      usage_hint: (opens a form)
      should_escape: false
    - command: /track-update
      description: Two-step: select app then edit all fields pre-filled from current record
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-note
      description: Add a comment or note to an application
      usage_hint: (opens a selector)
      should_escape: false
    - command: /track-delete
      description: Delete an application record (requires confirmation)
      usage_hint: (opens a selector)
      should_escape: false
    # Lookup
    - command: /company
      description: Search company info — name, domain, and description via BrandFetch
      usage_hint: "[company name] e.g. Salesforce"
      should_escape: false
    - command: /whoami
      description: Show your account details, role, and verification status
      usage_hint: (no arguments)
      should_escape: false
    - command: /activity
      description: Show your 10 most recent audit log events
      usage_hint: (no arguments)
      should_escape: false
    # Profile
    - command: /profile-name
      description: Update your display name
      usage_hint: (opens a form)
      should_escape: false
    - command: /profile-email
      description: Change your email address — sends a verification email to the new address
      usage_hint: (opens a form)
      should_escape: false
    - command: /profile-password
      description: Change your account password
      usage_hint: (opens a form)
      should_escape: false
    - command: /profile-resume
      description: Instructions for uploading a new master resume (.docx) via DM
      usage_hint: (no arguments)
      should_escape: false
    - command: /profile-guide
      description: View and edit your profile & voice guide
      usage_hint: (opens a form)
      should_escape: false
    # System
    - command: /jobstatus
      description: Check service health — storage, email, Drive, Anthropic key, active model, API latency
      usage_hint: (no arguments)
      should_escape: false
    - command: /help
      description: Show the full Job Apply command reference
      usage_hint: (no arguments)
      should_escape: false
    # Test runner (owner-only)
    - command: /run-tests
      description: Run automated test suites and report results (owner only)
      usage_hint: "[unit | api | slack | all]"
      should_escape: false
    - command: /test-status
      description: Check if a test run is currently in progress (owner only)
      usage_hint: (no arguments)
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands      # register slash commands
      - chat:write    # post messages and DMs
      - im:write      # open DM channels
      - im:history    # read DMs / Messages tab
      - im:read       # list DM channels

settings:
  # Socket Mode — requires SLACK_APP_TOKEN (xapp-...) set as a Fly secret.
  # No public request_url needed; all events are delivered over the WebSocket.
  socket_mode_enabled: true
  interactivity:
    is_enabled: true
  event_subscriptions:
    bot_events:
      - message.im        # receive DMs / Messages tab
      - app_home_opened   # render the App Home tab
  org_deploy_enabled: false
  token_rotation_enabled: false
