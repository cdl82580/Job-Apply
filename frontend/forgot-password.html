<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Job Application Agent</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary:      #1A3C5E;
      --border:       #2B6CB0;
      --text:         #111827;
      --muted:        #6B7280;
      --error:        #DC2626;
      --bg-page:      #F9FAFB;
      --bg-card:      #FFFFFF;
      --card-border:  #E5E7EB;
      --input-bg:     #FFFFFF;
      --input-border: #D1D5DB;
    }
    [data-theme="dark"] { color-scheme: dark;
      --primary:      #A5B4FC;
      --border:       #6366F1;
      --text:         #F0F0F5;
      --muted:        #94A3B8;
      --error:        #F87171;
      --bg-page:      #0A0A0A;
      --bg-card:      #111111;
      --card-border:  #1E1E1E;
      --input-bg:     #161616;
      --input-border: #2B2B2B;
    }

    html { background: #F9FAFB; }
    html[data-theme="dark"] { background: #0A0A0A; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem; transition: background .2s, color .2s;
    }

    .card {
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: 10px; padding: 2rem; width: 100%; max-width: 400px;
      transition: background .2s, border-color .2s;
    }

    .logo-wrap { display: flex; align-items: center; gap: .75rem; margin-bottom: .25rem; }
    .logo-img  { width: 36px; height: 36px; }
    .sub  { font-size: .875rem; color: var(--muted); margin-bottom: 1.75rem; margin-top: .2rem; }

    .field { margin-bottom: 1rem; }
    label  { display: block; font-weight: 600; font-size: .825rem; margin-bottom: .3rem; }

    input {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid var(--input-border); border-radius: 6px;
      font-size: .9rem; font-family: inherit;
      background: var(--input-bg); color: var(--text);
      transition: border-color .15s, background .2s, color .2s;
    }
    input:focus { outline: none; border-color: var(--border); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

    .btn {
      width: 100%; padding: .625rem;
      background: var(--primary); color: white;
      border: none; border-radius: 6px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; margin-top: .5rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.12); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .msg {
      border-radius: 6px; padding: .625rem .875rem;
      font-size: .825rem; margin-bottom: 1rem; display: none;
    }
    .msg.err { background: #FEF2F2; border: 1px solid #FECACA; color: var(--error); }
    .msg.ok  { background: #D1FAE5; border: 1px solid #6EE7B7; color: #065F46; }
    [data-theme="dark"] .msg.err { background: #2B1010; border-color: #7F1D1D; }
    [data-theme="dark"] .msg.ok  { background: #0D2B1E; border-color: #065F46; }

    .footer { text-align: center; margin-top: 1.25rem; font-size: .825rem; color: var(--muted); }
    .footer a { color: var(--border); text-decoration: none; font-weight: 600; }

    .theme-toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: 20px; padding: .3rem .65rem;
      cursor: pointer; font-size: .8rem; color: var(--muted);
      transition: border-color .15s, color .15s;
    }
    .theme-toggle:hover { border-color: var(--border); color: var(--text); }

    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: white;
      border-radius: 50%; animation: rot .7s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle"><span id="themeIcon"></span></button>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img" src="/img/logo.png" alt="Logo">
    <div class="logo">Job Application Agent</div>
  </div>
  <div class="sub">We'll email you a reset link</div>

  <div class="msg err" id="err"></div>
  <div class="msg ok"  id="ok"></div>

  <form id="forgotForm">
    <div class="field">
      <label for="email">Email address</label>
      <input id="email" name="email" type="email" autocomplete="email"
             required placeholder="you@example.com">
    </div>
    <button class="btn" type="submit" id="submitBtn">Send reset link</button>
  </form>

  <div class="footer"><a href="/login.html">← Back to sign in</a></div>
</div>
<script>
  const ICONS = { light: '☀', dark: '🌙' };
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.getElementById('themeIcon').textContent = ICONS[t];
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  document.getElementById('themeIcon').textContent =
    ICONS[document.documentElement.getAttribute('data-theme')] || ICONS.light;

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('submitBtn');
    const err   = document.getElementById('err');
    const ok    = document.getElementById('ok');
    const email = document.getElementById('email').value.trim();

    err.style.display = 'none';
    ok.style.display  = 'none';

    if (!email) {
      err.textContent = 'Please enter your email address.';
      err.style.display = 'block';
      document.getElementById('email').focus();
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Sending…';

    try {
      await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      ok.textContent = 'If that email address is on file, you will receive an email with password reset instructions shortly.';
      ok.style.display = 'block';
      document.getElementById('forgotForm').style.display = 'none';
    } catch {
      err.textContent = 'Network error — please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });
</script>
</body>
</html>
