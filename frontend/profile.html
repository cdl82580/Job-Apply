<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Job Application Agent</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script src="/marked.min.js"></script>
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary:      #1A3C5E;
      --border:       #2B6CB0;
      --fill:         #EEF4FB;
      --text:         #111827;
      --muted:        #6B7280;
      --error:        #DC2626;
      --success:      #065F46;
      --radius:       8px;
      --bg-page:      #F9FAFB;
      --bg-card:      #FFFFFF;
      --card-border:  #E5E7EB;
      --input-bg:     #FFFFFF;
      --input-border: #D1D5DB;
    }

    [data-theme="dark"] {
      --primary:      #A5B4FC;
      --border:       #6366F1;
      --fill:         #1A1A2E;
      --text:         #F0F0F5;
      --muted:        #94A3B8;
      --error:        #F87171;
      --success:      #4ADE80;
      --bg-page:      #0A0A0A;
      --bg-card:      #111111;
      --card-border:  #1E1E1E;
      --input-bg:     #161616;
      --input-border: #2B2B2B;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page); color: var(--text);
      margin: 0; padding: 0;
      transition: background .2s, color .2s;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem 2rem; }

    header { border-bottom: 2px solid var(--primary); margin-bottom: 2rem; padding: 0 1rem; }
    .header-inner { max-width: 1100px; margin: 0 auto; padding: 1.1rem 0 .9rem;
                    display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: .75rem; }
    .logo-img  { width: 36px; height: 36px; } .theme-toggle { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .logo-subtitle { font-size: .85rem; color: var(--muted); margin: .15rem 0 0; }
    @keyframes sparkle-pulse {
      0%, 100% { opacity: .5; transform: scale(1);   }
      50%       { opacity: 1;  transform: scale(1.2); }
    }
    .model-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      margin-left: .5rem; font-size: .72rem; font-weight: 500;
      color: var(--muted); background: var(--fill);
      border: 1px solid var(--card-border); border-radius: 4px;
      padding: .1rem .45rem .1rem .3rem; vertical-align: middle; letter-spacing: .01em;
    }
    .model-badge-icon { display: inline-block; animation: sparkle-pulse 2.4s ease-in-out infinite; line-height: 1; font-size: .8rem; }

    .header-right { display: flex; align-items: center; gap: .25rem; }
    .header-user { font-size: .825rem; color: var(--muted); margin-right: .375rem; }
    .header-icon-btn { display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: none; border: none; cursor: pointer; padding: 0;
      color: var(--muted); border-radius: 6px; text-decoration: none;
      transition: color .15s, background .15s; }
    .header-icon-btn:hover { color: var(--primary); background: var(--fill); }

    @media (max-width: 620px) {
      header { padding: 0 .75rem; margin-bottom: 1.5rem; }
      .header-inner { padding: .9rem 0 .75rem; }
      .logo-img { width: 30px; height: 30px; }
      .logo { font-size: 1rem; }
      .container { padding: 0 .75rem; }
    }

    .theme-toggle {
      background: none; border: 1px solid var(--card-border);
      border-radius: 20px; padding: .3rem .65rem;
      cursor: pointer; font-size: .8rem; color: var(--muted);
      transition: border-color .15s, color .15s;
    }
    .theme-toggle:hover { border-color: var(--border); color: var(--text); }

    .card {
      background: var(--bg-card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem;
      transition: background .2s, border-color .2s;
    }
    .card-title { font-size: .95rem; font-weight: 700; color: var(--primary); margin: 0 0 1.25rem; }

    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-weight: 600; font-size: .825rem; margin-bottom: .3rem; }
    label .opt { font-weight: 400; color: var(--muted); }

    input[type="text"], input[type="password"], textarea {
      width: 100%; padding: .5rem .75rem;
      border: 1px solid var(--input-border); border-radius: 6px;
      font-size: .9rem; font-family: inherit;
      background: var(--input-bg); color: var(--text);
      transition: border-color .15s, background .2s, color .2s;
    }
    input:focus, textarea:focus {
      outline: none; border-color: var(--border); box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    textarea { resize: vertical; min-height: 280px; line-height: 1.5; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .5rem 1.25rem;
      background: var(--primary); color: white;
      border: none; border-radius: 6px;
      font-size: .875rem; font-weight: 600; cursor: pointer;
      transition: filter .15s;
    }
    .btn:hover { filter: brightness(1.12); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    .btn-ghost {
      background: var(--bg-card); color: var(--primary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--fill); filter: none; }

    .btn-danger {
      background: var(--bg-card); color: var(--error);
      border: 1px solid var(--error);
    }
    .btn-danger:hover { background: #FEF2F2; filter: none; }
    [data-theme="dark"] .btn-danger:hover { background: #2B1010; }

    .toast {
      font-size: .825rem; padding: .5rem .875rem;
      border-radius: 6px; margin-top: .75rem; display: none;
    }
    .toast.ok  { background: #D1FAE5; color: #065F46; }
    .toast.err { background: #FEF2F2; color: var(--error); }
    [data-theme="dark"] .toast.ok  { background: #0D2B1E; color: #4ADE80; }
    [data-theme="dark"] .toast.err { background: #2B1010; color: var(--error); }

    .file-info { font-size: .825rem; color: var(--muted); margin-bottom: .75rem; }
    .file-info .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: #34D399; margin-right: .4rem;
    }

    /* ── Read-only field mode ────────────────────────────────────── */
    .card.view-mode [data-field] {
      pointer-events: none;
      background: var(--bg-page) !important;
      border-color: var(--card-border) !important;
      box-shadow: none !important;
      cursor: default;
      resize: none;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .card-header .card-title { margin: 0; }
    .edit-toggle-btn {
      font-size: .775rem; font-weight: 600; padding: .3rem .75rem;
      border: 1px solid var(--border); border-radius: 5px;
      background: none; color: var(--border); cursor: pointer;
      transition: background .12s;
    }
    .edit-toggle-btn:hover { background: var(--fill); }
    .btn-row { display: flex; gap: .5rem; align-items: center; }

    .file-drop {
      border: 2px dashed var(--input-border); border-radius: 8px;
      padding: 1rem; text-align: center; cursor: pointer; position: relative;
      transition: border-color .15s, background .15s;
    }
    .file-drop:hover { border-color: var(--border); background: var(--fill); }
    .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .file-drop .hint   { font-size: .8rem; color: var(--muted); }
    .file-drop .chosen { font-size: .85rem; font-weight: 600; color: var(--primary); margin-top: .25rem; }

    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: white;
      border-radius: 50%; animation: rot .7s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* ── Markdown toolbar ────────────────────────────────────────── */
    .md-toolbar {
      display: flex; gap: .25rem; flex-wrap: wrap; align-items: center;
      padding: .375rem .625rem;
      background: var(--bg-page);
      border: 1px solid var(--input-border);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
    }
    .md-toolbar ~ textarea { border-radius: 0 0 6px 6px; }
    .md-sep { width: 1px; height: 16px; background: var(--card-border); margin: 0 .15rem; }
    .md-btn {
      padding: .2rem .45rem; min-width: 26px; text-align: center;
      border: 1px solid var(--input-border); border-radius: 4px;
      background: var(--input-bg); color: var(--text);
      font-size: .775rem; font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 700; cursor: pointer; line-height: 1.4;
      transition: background .1s, border-color .1s;
    }
    .md-btn:hover { background: var(--fill); border-color: var(--border); color: var(--primary); }

    /* ── Markdown preview ────────────────────────────────────────── */
    .markdown-preview {
      font-size: .9rem; line-height: 1.7; color: var(--text);
      padding: 1rem 1.25rem;
      background: var(--bg-page);
      border: 1px solid var(--card-border);
      border-radius: 6px;
    }
    .markdown-preview h1, .markdown-preview h2, .markdown-preview h3,
    .markdown-preview h4 {
      color: var(--primary); font-weight: 700; margin: 1.25rem 0 .5rem;
      line-height: 1.3;
    }
    .markdown-preview h1 { font-size: 1.25rem; }
    .markdown-preview h2 { font-size: 1.1rem; }
    .markdown-preview h3 { font-size: 1rem; }
    .markdown-preview h4 { font-size: .9rem; }
    .markdown-preview p  { margin: 0 0 .75rem; }
    .markdown-preview ul, .markdown-preview ol {
      margin: 0 0 .75rem; padding-left: 1.5rem;
    }
    .markdown-preview li { margin-bottom: .2rem; }
    .markdown-preview strong { font-weight: 700; }
    .markdown-preview em    { font-style: italic; }
    .markdown-preview code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .82rem; padding: .1rem .35rem;
      background: var(--fill); border: 1px solid var(--card-border);
      border-radius: 4px; color: var(--primary);
    }
    .markdown-preview pre {
      background: var(--fill); border: 1px solid var(--card-border);
      border-radius: 6px; padding: .875rem 1rem; overflow-x: auto;
      margin: 0 0 .75rem;
    }
    .markdown-preview pre code {
      background: none; border: none; padding: 0;
      font-size: .82rem; color: var(--text);
    }
    .markdown-preview blockquote {
      border-left: 3px solid var(--border); margin: 0 0 .75rem;
      padding: .25rem 0 .25rem 1rem; color: var(--muted);
    }
    .markdown-preview hr {
      border: none; border-top: 1px solid var(--card-border); margin: 1rem 0;
    }
    .markdown-preview a { color: var(--border); }

    .account-info { font-size: .875rem; color: var(--muted); margin-bottom: 1rem; }
    .account-info strong { color: var(--text); }

    /* Email verification row */
    .email-verify-row {
      display: flex; align-items: center; gap: .625rem;
      margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .verify-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .775rem; font-weight: 700; padding: .25rem .65rem;
      border-radius: 999px; white-space: nowrap;
    }
    .verify-badge.verified   { background: #D1FAE5; color: #065F46; }
    .verify-badge.unverified { background: #FEF3C7; color: #92400E; }
    [data-theme="dark"] .verify-badge.verified   { background: #0D2B1E; color: #4ADE80; }
    [data-theme="dark"] .verify-badge.unverified { background: #2D2010; color: #FCD34D; }
    .resend-btn {
      font-size: .775rem; font-weight: 600; padding: .25rem .7rem;
      border: 1px solid #D97706; border-radius: 5px; background: none;
      color: #92400E; cursor: pointer; transition: background .12s; white-space: nowrap;
    }
    [data-theme="dark"] .resend-btn { color: #FCD34D; border-color: #92400E; }
    .resend-btn:hover:not(:disabled) { background: rgba(217,119,6,.12); }
    .resend-btn:disabled { opacity: .5; cursor: not-allowed; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
    <div class="header-left">
      <img class="logo-img" src="/img/logo.png" alt="Logo">
      <div>
        <div class="logo">Profile Settings</div>
        <p class="logo-subtitle">Manage your account, resume, and voice guide.<span class="model-badge hidden" id="modelBadge"><span class="model-badge-icon">✦</span><span id="modelBadgeText"></span></span></p>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle"><span id="themeIcon"></span></button>
      <span class="header-user" id="headerUser"></span>
      <a class="header-icon-btn" href="/" title="Agent" aria-label="Agent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a class="header-icon-btn" href="/kb.html" title="Knowledge Base" aria-label="Knowledge Base">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </a>
      <a class="header-icon-btn" href="/tracking.html" title="Application Tracker" aria-label="Application Tracker">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      </a>
      <a class="header-icon-btn" href="/calendar.html" title="Calendar" aria-label="Calendar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </a>
      <button class="header-icon-btn" id="logoutBtnHeader" title="Sign Out" aria-label="Sign Out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    </div><!-- /.header-inner -->
  </header>

<div class="container">

  <!-- Account -->
  <div class="card view-mode" id="accountCard">
    <div class="card-header">
      <p class="card-title">Account</p>
      <button class="edit-toggle-btn" id="nameEditBtn">&#x270E; Edit</button>
    </div>
    <p class="account-info" id="accountInfo">Loading…</p>
    <div class="email-verify-row" id="emailVerifyRow" style="display:none">
      <span class="verify-badge" id="verifyBadge"></span>
      <button class="resend-btn hidden" id="resendBtn">Resend verification email</button>
      <span class="toast" id="resendToast" style="margin:0"></span>
    </div>
    <form id="nameForm">
      <div class="field">
        <label for="display_name">Display Name</label>
        <input id="display_name" name="display_name" type="text" data-field required>
      </div>
      <div class="btn-row">
        <button class="btn hidden" type="submit" id="nameBtn">Save</button>
        <button class="btn btn-ghost hidden" type="button" id="nameCancelBtn">Cancel</button>
      </div>
      <div class="toast" id="nameToast"></div>
    </form>
  </div>

  <!-- Master Resume -->
  <div class="card">
    <p class="card-title">Master Resume</p>
    <div class="file-info" id="resumeStatus"></div>
    <form id="resumeForm" enctype="multipart/form-data">
      <div class="field">
        <label>Upload New Resume (.docx)</label>
        <div class="file-drop">
          <input type="file" name="resume" id="resumeFile" accept=".docx" required>
          <div class="hint">Click to browse or drag &amp; drop</div>
          <div class="chosen" id="chosenResume"></div>
        </div>
      </div>
      <button class="btn" type="submit" id="resumeBtn">Upload Resume</button>
      <div class="toast" id="resumeToast"></div>
    </form>
  </div>

  <!-- Profile guide -->
  <div class="card view-mode" id="profileCard">
    <div class="card-header">
      <p class="card-title">Profile &amp; Voice Guide</p>
      <button class="edit-toggle-btn" id="profileEditBtn">&#x270E; Edit</button>
    </div>
    <p style="font-size:.825rem;color:var(--muted);margin:0 0 .875rem">
      This tells the AI how to write in your voice. Markdown is supported.
    </p>
    <form id="profileForm">
      <!-- Markdown preview (view mode) -->
      <div class="markdown-preview" id="profilePreview"></div>

      <!-- Markdown toolbar (edit mode only) -->
      <div class="md-toolbar hidden" id="mdToolbar">
        <button type="button" class="md-btn" data-md="bold"   title="Bold">B</button>
        <button type="button" class="md-btn" data-md="italic" title="Italic"><em>I</em></button>
        <div class="md-sep"></div>
        <button type="button" class="md-btn" data-md="h2"     title="Heading 2">H2</button>
        <button type="button" class="md-btn" data-md="h3"     title="Heading 3">H3</button>
        <div class="md-sep"></div>
        <button type="button" class="md-btn" data-md="ul"     title="Bullet list">• List</button>
        <button type="button" class="md-btn" data-md="ol"     title="Numbered list">1. List</button>
        <div class="md-sep"></div>
        <button type="button" class="md-btn" data-md="code"      title="Inline code">&lt;/&gt;</button>
        <button type="button" class="md-btn" data-md="underline" title="Underline">U̲</button>
        <button type="button" class="md-btn" data-md="link"      title="Hyperlink">🔗</button>
        <button type="button" class="md-btn" data-md="hr"        title="Divider">—</button>
      </div>

      <!-- Textarea (edit mode only) -->
      <textarea id="profile_text" name="profile_text" data-field class="hidden"
                style="min-height:280px;border-radius:0 0 6px 6px"></textarea>

      <div class="btn-row" style="margin-top:.875rem">
        <button class="btn hidden" type="submit" id="profileBtn">Save</button>
        <button class="btn btn-ghost hidden" type="button" id="profileCancelBtn">Cancel</button>
      </div>
      <div class="toast" id="profileToast"></div>
    </form>
  </div>

  <!-- Password -->
  <div class="card">
    <p class="card-title">Change Password</p>
    <form id="pwForm">
      <div class="row">
        <div class="field">
          <label for="current_password">Current Password</label>
          <input id="current_password" name="current_password" type="password" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="new_password">New Password <span class="opt">(min 8)</span></label>
          <input id="new_password" name="new_password" type="password" autocomplete="new-password" required minlength="8">
        </div>
      </div>
      <button class="btn" type="submit" id="pwBtn">Update Password</button>
      <div class="toast" id="pwToast"></div>
    </form>
  </div>

  <!-- Logout -->
  <div style="text-align:right; padding-bottom:2rem">
    <button class="btn btn-ghost" id="logoutBtn">Sign Out</button>
  </div>
</div>
<script>
  const ICONS = { light: '☀', dark: '🌙' };
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    document.getElementById('themeIcon').textContent = ICONS[t];
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  document.getElementById('themeIcon').textContent =
    ICONS[document.documentElement.getAttribute('data-theme')] || ICONS.light;

  async function apiFetch(url, opts = {}) {
    const res = await fetch(url, opts);
    if (res.status === 401) { window.location.href = '/login.html'; throw new Error('401'); }
    return res;
  }

  function toast(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg; el.className = `toast ${type}`; el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  // Init marked before any async calls that use it
  if (typeof marked !== 'undefined') marked.use({ breaks: true, gfm: true });

  function renderPreview(text) {
    const preview = document.getElementById('profilePreview');
    if (typeof marked !== 'undefined') {
      preview.innerHTML = marked.parse(text || '*No profile content yet.*');
    } else {
      preview.textContent = text || '';
    }
    preview.classList.remove('hidden');
    document.getElementById('profile_text').classList.add('hidden');
    document.getElementById('mdToolbar').classList.add('hidden');
  }

  function showEditor() {
    document.getElementById('profilePreview').classList.add('hidden');
    document.getElementById('profile_text').classList.remove('hidden');
    document.getElementById('mdToolbar').classList.remove('hidden');
  }

  async function doLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  }
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('logoutBtnHeader').addEventListener('click', doLogout);

  async function loadProfile() {
    // Admins have no profile — send them to the dashboard
    try {
      const me = await (await apiFetch('/api/auth/me')).json();
      if (me.role === 'admin') { window.location.replace('/admin.html'); return; }
      document.getElementById('headerUser').textContent = me.display_name || me.email;
      if (me.model) { document.getElementById('modelBadgeText').textContent = me.model; document.getElementById('modelBadge').classList.remove('hidden'); }
    } catch (_) {}
    const res = await apiFetch('/api/profile');
    const d   = await res.json();

    document.getElementById('accountInfo').innerHTML = `Signed in as <strong>${d.email}</strong>`;
    document.getElementById('display_name').value  = d.display_name ?? '';
    document.getElementById('profile_text').value  = d.profile_text ?? '';
    renderPreview(d.profile_text ?? '');

    // Email verification indicator
    const row   = document.getElementById('emailVerifyRow');
    const badge = document.getElementById('verifyBadge');
    const resendBtn = document.getElementById('resendBtn');
    row.style.display = 'flex';
    if (d.email_verified === false) {
      badge.textContent = '✗ Email not verified';
      badge.className   = 'verify-badge unverified';
      resendBtn.classList.remove('hidden');
    } else {
      badge.textContent = '✓ Email verified';
      badge.className   = 'verify-badge verified';
    }

    const fname = d.resume_filename ? ` — ${d.resume_filename}` : '';
    document.getElementById('resumeStatus').innerHTML = d.has_resume
      ? `<span class="dot"></span>Resume on file<span style="color:var(--muted);font-weight:400">${fname}</span>`
      : '<span style="color:var(--error)">⚠ No resume uploaded yet</span>';
  }
  loadProfile();

  document.getElementById('resendBtn').addEventListener('click', async function() {
    this.disabled = true; this.textContent = 'Sending…';
    const toastEl = document.getElementById('resendToast');
    try {
      const res = await apiFetch('/api/auth/resend-verification', { method: 'POST' });
      const data = await res.json();
      if (data.already_verified) {
        toastEl.textContent = '✓ Your email is already verified.';
        toastEl.className   = 'toast ok'; toastEl.style.display = 'inline-block';
        this.classList.add('hidden');
        document.getElementById('verifyBadge').textContent = '✓ Email verified';
        document.getElementById('verifyBadge').className   = 'verify-badge verified';
      } else {
        toastEl.textContent = '✓ Verification email sent — check your inbox.';
        toastEl.className   = 'toast ok'; toastEl.style.display = 'inline-block';
        this.textContent = 'Resend again';
        this.disabled = false;
      }
    } catch (_) {
      toastEl.textContent = 'Failed to send — please try again.';
      toastEl.className   = 'toast err'; toastEl.style.display = 'inline-block';
      this.textContent = 'Resend verification email';
      this.disabled = false;
    }
    setTimeout(() => { toastEl.style.display = 'none'; }, 5000);
  });

  // ── Markdown toolbar ─────────────────────────────────────────────
  document.getElementById('mdToolbar').addEventListener('click', e => {
    const btn = e.target.closest('[data-md]');
    if (!btn) return;
    const ta    = document.getElementById('profile_text');
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    const sel   = ta.value.slice(start, end);
    const before = ta.value.slice(0, start);
    const after  = ta.value.slice(end);
    let insert = '';

    switch (btn.dataset.md) {
      case 'bold':   insert = `**${sel || 'bold text'}**`; break;
      case 'italic': insert = `*${sel || 'italic text'}*`; break;
      case 'h2':     insert = `\n## ${sel || 'Heading'}\n`; break;
      case 'h3':     insert = `\n### ${sel || 'Heading'}\n`; break;
      case 'ul':     insert = `\n- ${sel || 'item'}\n`; break;
      case 'ol':     insert = `\n1. ${sel || 'item'}\n`; break;
      case 'code':      insert = sel.includes('\n') ? `\`\`\`\n${sel || 'code'}\n\`\`\`` : `\`${sel || 'code'}\``; break;
      case 'underline': insert = `<u>${sel || 'underlined text'}</u>`; break;
      case 'link': {
        const linkText = sel || 'link text';
        insert = `[${linkText}](url)`;
        // After inserting, select just the "url" placeholder so user can type over it
        ta.value = before + insert + after;
        const urlStart = before.length + linkText.length + 3; // after `[text](`
        ta.setSelectionRange(urlStart, urlStart + 3);         // select "url"
        ta.focus();
        return;
      }
      case 'hr':        insert = `\n\n---\n\n`; break;
    }
    ta.value = before + insert + after;
    const cursor = before.length + insert.length;
    ta.setSelectionRange(cursor, cursor);
    ta.focus();
  });

  // ── Edit toggle helpers ──────────────────────────────────────────
  function enterEdit(cardId, editBtnId, saveBtnId, cancelBtnId) {
    document.getElementById(cardId).classList.remove('view-mode');
    document.getElementById(editBtnId).classList.add('hidden');
    document.getElementById(saveBtnId).classList.remove('hidden');
    document.getElementById(cancelBtnId).classList.remove('hidden');
  }
  function exitEdit(cardId, editBtnId, saveBtnId, cancelBtnId) {
    document.getElementById(cardId).classList.add('view-mode');
    document.getElementById(editBtnId).classList.remove('hidden');
    document.getElementById(saveBtnId).classList.add('hidden');
    document.getElementById(cancelBtnId).classList.add('hidden');
  }

  // Account card
  let _origName = '';
  document.getElementById('nameEditBtn').addEventListener('click', () => {
    _origName = document.getElementById('display_name').value;
    enterEdit('accountCard', 'nameEditBtn', 'nameBtn', 'nameCancelBtn');
    document.getElementById('display_name').focus();
  });
  document.getElementById('nameCancelBtn').addEventListener('click', () => {
    document.getElementById('display_name').value = _origName;
    exitEdit('accountCard', 'nameEditBtn', 'nameBtn', 'nameCancelBtn');
  });

  document.getElementById('nameForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('nameBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
    const res  = await apiFetch('/api/profile', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: document.getElementById('display_name').value }),
    });
    const body = await res.json();
    toast('nameToast', res.ok ? '✓ Name saved.' : (body.detail ?? 'Error'), res.ok ? 'ok' : 'err');
    btn.disabled = false; btn.textContent = 'Save';
    if (res.ok) exitEdit('accountCard', 'nameEditBtn', 'nameBtn', 'nameCancelBtn');
  });

  const resumeFile = document.getElementById('resumeFile');
  resumeFile.addEventListener('change', () => {
    document.getElementById('chosenResume').textContent = resumeFile.files[0]?.name ?? '';
  });
  document.getElementById('resumeForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('resumeBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Uploading…';
    const res  = await apiFetch('/api/profile/resume', { method: 'POST', body: new FormData(e.target) });
    const body = await res.json();
    if (res.ok) {
      const fname = resumeFile.files[0]?.name || '';
      const label = fname ? ` — ${fname}` : '';
      document.getElementById('resumeStatus').innerHTML =
        `<span class="dot"></span>Resume on file<span style="color:var(--muted);font-weight:400">${label}</span>`;
      document.getElementById('chosenResume').textContent = '';
      resumeFile.value = '';
    }
    toast('resumeToast', res.ok ? '✓ Resume updated.' : (body.detail ?? 'Error'), res.ok ? 'ok' : 'err');
    btn.disabled = false; btn.textContent = 'Upload Resume';
  });

  // Profile card
  let _origProfile = '';
  document.getElementById('profileEditBtn').addEventListener('click', () => {
    _origProfile = document.getElementById('profile_text').value;
    enterEdit('profileCard', 'profileEditBtn', 'profileBtn', 'profileCancelBtn');
    showEditor();
    document.getElementById('profile_text').focus();
  });
  document.getElementById('profileCancelBtn').addEventListener('click', () => {
    const ta = document.getElementById('profile_text');
    ta.value = _origProfile;
    exitEdit('profileCard', 'profileEditBtn', 'profileBtn', 'profileCancelBtn');
    renderPreview(_origProfile);
  });

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('profileBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Saving…';
    const res  = await apiFetch('/api/profile', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile_text: document.getElementById('profile_text').value }),
    });
    const body = await res.json();
    toast('profileToast', res.ok ? '✓ Profile saved.' : (body.detail ?? 'Error'), res.ok ? 'ok' : 'err');
    btn.disabled = false; btn.textContent = 'Save';
    if (res.ok) {
      const saved = document.getElementById('profile_text').value;
      exitEdit('profileCard', 'profileEditBtn', 'profileBtn', 'profileCancelBtn');
      renderPreview(saved);
    }
  });

  document.getElementById('pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn  = document.getElementById('pwBtn');
    const data = Object.fromEntries(new FormData(e.target));
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Updating…';
    const res  = await apiFetch('/api/profile/password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
    });
    const body = await res.json();
    if (res.ok) document.getElementById('pwForm').reset();
    toast('pwToast', res.ok ? '✓ Password updated.' : (body.detail ?? 'Error'), res.ok ? 'ok' : 'err');
    btn.disabled = false; btn.textContent = 'Update Password';
  });

</script>
</body>
</html>
