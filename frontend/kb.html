<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base — Job Apply Agents</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --primary:      #1A3C5E;
      --border:       #2B6CB0;
      --fill:         #EEF4FB;
      --text:         #111827;
      --muted:        #6B7280;
      --error:        #DC2626;
      --success:      #065F46;
      --radius:       8px;
      --bg-page:      #F9FAFB;
      --bg-card:      #FFFFFF;
      --card-border:  #E5E7EB;
      --input-bg:     #FFFFFF;
      --input-border: #D1D5DB;
    }

    [data-theme="dark"] { color-scheme: dark;
      --primary:      #A5B4FC;
      --border:       #6366F1;
      --fill:         #1A1A2E;
      --text:         #F0F0F5;
      --muted:        #94A3B8;
      --error:        #F87171;
      --success:      #4ADE80;
      --bg-page:      #0A0A0A;
      --bg-card:      #111111;
      --card-border:  #1E1E1E;
      --input-bg:     #161616;
      --input-border: #2B2B2B;
    }

    html, body { height: 100%; background: var(--bg-page); }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .2s, color .2s;
    }

    /* ── Header ── */
    header {
      border-bottom: 2px solid var(--primary);
      margin-bottom: 0;
      padding: 0 1rem;
      position: sticky;
      top: 0;
      background: var(--bg-page);
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 0 .875rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .header-left { display: flex; align-items: center; gap: .875rem; flex-shrink: 0; }
    .app-logo { width: 36px; height: 36px; }
    .app-logo img { width: 36px; height: 36px; }
    header h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); margin: 0; white-space: nowrap; }

    .header-search {
      flex: 1;
      max-width: 420px;
      position: relative;
    }
    .header-search svg {
      position: absolute;
      left: .65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .header-search input {
      width: 100%;
      padding: .45rem .75rem .45rem 2.1rem;
      border: 1px solid var(--input-border);
      border-radius: 20px;
      font-size: .875rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .header-search input:focus {
      border-color: var(--border);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--border) 20%, transparent);
    }
    .header-search input::placeholder { color: var(--muted); }

    .header-actions { display: flex; align-items: center; gap: .25rem; flex-shrink: 0; }
    .header-icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; background: none; border: none;
      cursor: pointer; padding: 0; color: var(--muted); border-radius: 6px;
      text-decoration: none; transition: color .15s, background .15s;
    }
    .header-icon-btn:hover { color: var(--primary); background: var(--fill); }
    .header-icon-btn.active { color: var(--primary); }
    .theme-toggle {
      background: none; border: 1px solid var(--card-border); border-radius: 20px;
      padding: .3rem .65rem; cursor: pointer; font-size: .8rem; color: var(--muted);
      transition: border-color .15s;
    }
    .theme-toggle:hover { border-color: var(--border); }

    /* ── Layout ── */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
      flex: 1;
      width: 100%;
    }

    /* ── Main content ── */
    .main { min-width: 0; }

    /* ── Search results state ── */
    .search-results { display: none; }
    .search-results.visible { display: block; }

    .result-item {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: .75rem;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s;
    }
    .result-item:hover {
      border-color: var(--border);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--border) 15%, transparent);
    }
    .result-title { font-size: .95rem; font-weight: 600; color: var(--primary); margin: 0 0 .25rem; }
    .result-cat { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
    .result-snippet { font-size: .82rem; color: var(--muted); line-height: 1.5; }
    .result-snippet mark { background: color-mix(in srgb, var(--border) 25%, transparent); color: var(--text); border-radius: 2px; padding: 0 2px; }
    .no-results { color: var(--muted); font-size: .9rem; padding: 2rem 0; text-align: center; }

    /* ── Category view ── */
    .category-view { display: none; }
    .category-view.visible { display: block; }

    .cat-header { margin-bottom: 1.5rem; }
    .cat-title { font-size: 1.35rem; font-weight: 700; color: var(--primary); margin: 0 0 .3rem; }
    .cat-desc { color: var(--muted); font-size: .9rem; margin: 0; }

    .article-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .875rem;
    }
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s;
    }
    .article-card:hover {
      border-color: var(--border);
      box-shadow: 0 2px 10px color-mix(in srgb, var(--border) 15%, transparent);
    }
    .article-card-title { font-size: .9rem; font-weight: 600; color: var(--primary); margin: 0 0 .35rem; }
    .article-card-snippet { font-size: .8rem; color: var(--muted); line-height: 1.5; margin: 0; }

    /* ── Article view ── */
    .article-view { display: none; }
    .article-view.visible { display: block; }

    .breadcrumb {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .35rem;
    }
    .breadcrumb a, .breadcrumb button {
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: .8rem;
      font-family: inherit;
    }
    .breadcrumb a:hover, .breadcrumb button:hover { text-decoration: underline; }

    .article-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin: 0 0 .5rem; }
    .article-meta { font-size: .78rem; color: var(--muted); margin-bottom: 1.75rem; display: flex; gap: 1rem; }
    .article-body { line-height: 1.7; font-size: .925rem; }

    .article-body h3 { font-size: .9rem; font-weight: 700; color: var(--text); margin: 1.25rem 0 .4rem; }
    .article-body p { margin: 0 0 .9rem; color: var(--text); }
    .article-body ul, .article-body ol { margin: 0 0 .9rem; padding-left: 1.4rem; }
    .article-body li { margin-bottom: .3rem; }
    .article-body code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .82em;
      background: var(--fill);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: .1em .35em;
    }
    .article-body pre {
      background: #0F172A;
      color: #CBD5E1;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: .75rem 0 1rem;
    }
    .article-body pre code { background: none; border: none; padding: 0; font-size: .82rem; color: inherit; }
    .article-body blockquote {
      border-left: 3px solid var(--border);
      margin: .75rem 0 1rem;
      padding: .5rem .75rem .5rem 1rem;
      background: var(--fill);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted);
      font-style: italic;

    .article-body table { width: 100%; border-collapse: collapse; margin: .75rem 0 1rem; font-size: .85rem; }
    .article-body th {

    {
      id: 'gs-overview',
      category: 'getting-started',
      title: 'How the Agent Works',
      snippet: 'End-to-end overview of the 8-step workflow that produces a tailored resume, ATS resume, and cover letter.',
      readTime: '3 min',
      body: `
<h2>What the Agent Does</h2>
<p>The Job Apply Agent takes a job posting and produces three documents — all tailored to that specific role:</p>
<ul>
  <li><strong>Tailored Resume</strong> (<code>.docx</code>) — styled, two-column, branded format built on your master resume</li>
  <li><strong>ATS Resume</strong> (<code>.docx</code>) — single-column, plain-text-friendly version for applicant tracking systems</li>
  <li><strong>Cover Letter</strong> (<code>.docx</code>) — evidence-led, first-person letter written in your voice</li>
</ul>
<p>All three are uploaded to a Google Drive subfolder and named consistently for easy retrieval.</p>

<h2>The 8-Step Workflow</h2>
<ol>
  <li><strong>Read inputs</strong> — master resume, <code>profile.md</code>, and the job posting</li>
  <li><strong>Analysis</strong> — role type classification, framing angle, top-5 JD requirements, competency mapping</li>
  <li><strong>Unpack master</strong> — extract the <code>.docx</code> XML to an <code>unpacked/</code> directory</li>
  <li><strong>Apply edits</strong> — rewrite tagline, summary, competencies, and bullets via Python string replacement</li>
  <li><strong>Pack &amp; validate</strong> — repack the XML into a valid <code>.docx</code> and confirm all validations pass</li>
  <li><strong>ATS resume</strong> — automatically generated from the same tailored content</li>
  <li><strong>Cover letter</strong> — generated via a Node.js script using the <code>docx</code> package</li>
  <li><strong>Upload to Drive</strong> — all three files land in a new subfolder under <em>Job Applications</em></li>
</ol>

<h2>One Invariant</h2>
<blockquote>Every run starts from <code>resumes/master.docx</code>. Never a previously tailored file.</blockquote>
<p>This keeps the master clean and ensures each run is independent. The <code>unpacked/</code> directory and temp scripts are cleaned up after each run.</p>
      `
    },
    {
      id: 'gs-first-run',
      category: 'getting-started',
      title: 'Running Your First Application',
      snippet: 'CLI and web app entry points, file naming convention, and what to expect on the first run.',
      readTime: '4 min',
      body: `
<h2>Two Ways to Run</h2>

<h3>1. CLI</h3>
<pre><code>python3 apply.py --job jobs/job.txt --company "CompanyName" --role "Role Title"</code></pre>
<p>Save the job posting as plain text in <code>jobs/job.txt</code>, then run the command above. The agent reads the file and executes all 8 steps.</p>

<h3>2. Web App</h3>
<p>Go to <a href="https://job-apply-corey.fly.dev/" target="_blank">job-apply-corey.fly.dev</a>, paste the job posting into the form, fill in company and role, then click <strong>Run</strong>. Progress streams live via SSE.</p>

<h2>Output Structure</h2>
<p>Each run creates a subfolder under <code>output/</code>:</p>
<pre><code>output/Acme_SolutionsEngineer/
  Resume_CoreyLaverdiere_Acme_SolutionsEngineer.docx
  Resume_CoreyLaverdiere_Acme_SolutionsEngineer_ATS.docx
  CoverLetter_CoreyLaverdiere_Acme_SolutionsEngineer.docx</code></pre>
<p>The subfolder name is <code>[CompanyName]_[ShortRole]</code> with spaces removed.</p>

<h2>Google Drive Upload</h2>
<p>If <code>gdrive_credentials.json</code> is present in the project root, files are automatically uploaded to a subfolder under <em>Job Applications</em>. If the credentials file is missing, upload is silently skipped and a warning is printed — all local files are still produced.</p>

<h2>First-Time Drive Setup</h2>
<pre><code>python3 setup_gdrive.py</code></pre>
<p>Follow the printed instructions to download OAuth credentials from Google Cloud Console, then re-run. A browser window opens once for authorization; the token is cached at <code>~/.config/job-apply/gdrive_token.json</code>.</p>
      `
    },

      category: 'getting-started',

      snippet: 'What the agent figures out in Step 2 before touching any files — role type, framing angle, competency mapping.',
      readTime: '3 min',
      body: `
<h2>Why Analysis Comes First</h2>
<p>Before any file is modified, the agent produces a structured analysis of the job posting. This is the plan that drives every subsequent edit. Skipping or rushing it produces generic output.</p>

<h2>What the Analysis Covers</h2>
<ul>
  <li><strong>Role type</strong> — Is this PS Delivery? Pre-Sales SE? TAM? Integration Engineer? The classification determines the framing angle.</li>
  <li><strong>Framing angle</strong> — A single narrative thread that runs through the tagline, summary, competencies, and every bullet. Everything ladders up to this one story.</li>
  <li><strong>Top 5 JD requirements</strong> — The things that must appear on page 1, usually drawn directly from the job description's "requirements" or "responsibilities" section.</li>
  <li><strong>Competencies to feature</strong> — Which 14 of the available competency cells best match this JD. Order matters — left-to-right, top-to-bottom scan order.</li>
  <li><strong>Bullets to rewrite</strong> — Which eHealth and HSP bullets need the most work and why.</li>
  <li><strong>Cover letter hook</strong> — The opening angle, usually a mirror or paraphrase of the JD's own language.</li>
  <li><strong>Tone notes</strong> — Specific language from the JD worth echoing back.</li>
</ul>

<h2>Reading the Analysis Output</h2>
<p>The analysis is printed as a numbered list before any edits begin. If you're watching a run in the terminal or via SSE, this is the first substantive output — it's worth reading to verify the agent classified the role correctly before the edits start.</p>
<p>If the framing angle looks wrong, you can interrupt and provide a correction — the agent will re-analyze before proceeding.</p>
      `

      readTime: '4 min',
      body: `
<h2>Core Identity</h2>
<p>PS Delivery roles are about owning the entire customer journey — from requirements gathering and solution design through implementation, go-live, and hypercare. The hiring manager wants to see lifecycle ownership, not just task execution.</p>

<h2>Framing Angle</h2>
<p><strong>"Full lifecycle ownership, customer trust, requirements → hypercare."</strong></p>
<p>Every bullet should tell a story of end-to-end ownership. Not "I built X" but "I took X from requirements through hypercare and the customer renewed."</p>

<h2>Top Signals to Surface</h2>
<ul>
  <li>Multi-stakeholder project ownership (sponsor + technical team + end users)</li>
  <li>Discovery and requirements documentation</li>
  <li>Integration work that connected systems the customer couldn't connect before</li>
  <li>Go-live milestones met on schedule</li>
  <li>Customer satisfaction post-launch (CSAT scores, renewal, expansion)</li>
  <li>Escalation management — stepping in when things went wrong</li>
</ul>

      id: 'res-xml',
      category: 'admin',
      title: 'XML Editing — How It Works',
      snippet: 'How the agent reads and edits document.xml — Python string replacement, XML entities, and the no-pandoc rule.',
      readTime: '5 min',
      body: `
<h2>The Unpack → Edit → Pack Cycle</h2>
<p>A <code>.docx</code> file is a ZIP archive containing XML files. The workflow unpacks it, edits the XML, then repacks it into a valid <code>.docx</code>.</p>
<pre><code># Unpack
python3 scripts/office/unpack.py resumes/master.docx unpacked/

# Edit unpacked/word/document.xml ...

# Pack and validate
python3 scripts/office/pack.py unpacked/ output/Resume_...docx --original resumes/master.docx</code></pre>

<h2>Python String Replacement — Not sed</h2>
<p>All edits use Python's <code>content.replace(old, new, 1)</code>. The <code>1</code> ensures exactly one replacement per call — a zero-match result is an error, not a silent skip.</p>
<pre><code>with open('unpacked/word/document.xml', 'r', encoding='utf-8') as f:
    content = f.read()

content = content.replace(old_text, new_text, 1)

with open('unpacked/word/document.xml', 'w', encoding='utf-8') as f:
    f.write(content)</code></pre>

<h2>The Pandoc Rule</h2>
<p>The agent reads the resume with <code>pandoc resumes/master.docx -t plain</code> to understand the content. But every <code>old</code> search string used in replacements must be derived from reading <code>unpacked/word/document.xml</code> directly — never from the pandoc output.</p>
<p>Why? Pandoc transforms the content in ways that don't match the raw XML:</p>
<ul>
  <li>Wraps long lines at arbitrary column widths</li>
  <li>Unescapes XML entities (<code>&amp;amp;</code> → <code>&amp;</code>, <code>&amp;#8217;</code> → <code>'</code>)</li>
  <li>Indents table cell text across multiple lines</li>
</ul>
<p>None of that matches the single-line, entity-escaped literal text inside <code>&lt;w:t&gt;</code> elements. Search strings from pandoc output will silently fail to match.</p>

<h2>Special Characters in Replacements</h2>
<p>Use Unicode escapes in the <code>new</code> (replacement) text:</p>
<table>
  <tr><th>Character</th><th>Python escape</th></tr>
  <tr><td>Em dash —</td><td><code>\\u2014</code></td></tr>
  <tr><td>Curly apostrophe '</td><td><code>\\u2019</code></td></tr>
  <tr><td>En dash –</td><td><code>\\u2013</code></td></tr>
  <tr><td>Ampersand &amp;</td><td>Use <code>&amp;amp;</code> in the <code>old</code> text; use literal <code>&amp;</code> in <code>new</code> text</td></tr>
</table>

<h2>Verification</h2>
<p>After all replacements, print a count of successes vs. failures. Any 0-match replacement must be debugged before continuing — silent failure means the document shipped with unedited content.</p>
      `

      readTime: '3 min',
      body: `
<h2>Why P1 Is Different</h2>
<p>The opening paragraph is the only one a hiring manager definitely reads. The rest depends on whether P1 earns it. A generic opener means the letter gets skimmed or skipped.</p>

<h2>The Mirror Technique</h2>
<p>Find a phrase in the JD that captures what the role is really about — not the generic boilerplate, but the specific thing the hiring manager cares about. Use it or rephrase it in your first sentence.</p>
<blockquote>JD says: "We're looking for someone who can take implementation from signed contract to go-live in 90 days."<br><br>
P1: "When [Company] talks about 90-day implementation cycles, I recognize that as the exact model I've been running for the last six years — and the reason I'm applying."</blockquote>

<h2>The Story Open</h2>
<p>Lead with a single, specific moment or outcome. Don't set up the story — just start in it.</p>
<blockquote>"In 2023, I took a stalled HL7 integration at [Health Authority] from six months of deadlock to production in eleven weeks. The team was three people, the technical requirements changed twice, and the go-live date didn't move."</blockquote>

<h2>The Observation Open</h2>

<h2>The Voice</h2>
<p>The cover letter is written in first person, direct, with no corporate filler. It should sound like Corey explaining the work over coffee — not like a LinkedIn summary written by a committee.</p>

<h2>Do-Not-Use Phrases</h2>
<ul>

<h2>The Problem</h2>
<p>The styled resume (<code>.docx</code>) uses tables, text boxes, and a two-column layout that looks great in Word but can confuse applicant tracking systems (ATS). Many ATS parsers read text linearly and lose track of content in table cells or text boxes.</p>

<h2>The ATS Resume</h2>
<p>The ATS resume is a single-column, plain-structure version of the same tailored content. It's auto-generated by <code>build_ats_resume()</code> in <code>apply.py</code> after the styled resume is packed.</p>

<h2>What Makes It Parser-Friendly</h2>
<ul>
  <li>No tables — all content in flat paragraphs</li>
  <li>No text boxes</li>
  <li>No multi-column layout</li>
  <li>Black text only (no colored elements)</li>
  <li>Linear reading order matches visual reading order</li>
  <li>Education and Certifications sections appended at the bottom</li>
</ul>

<h2>Same Content, Different Structure</h2>
<p>The ATS resume contains the same tailored content — tagline, summary, all 14 competencies, all 10 bullets, plus the static bullets. Only the layout changes. The competencies are rendered as a comma-separated list or a simple bulleted list, not a table.</p>

<h2>When to Submit Which</h2>
<ul>
  <li><strong>Styled resume</strong> — use for any application where a human will likely open the file</li>
  <li><strong>ATS resume</strong> — use when applying through an ATS portal, or if the job posting asks to paste your resume into a text field</li>
  <li><strong>Both</strong> — when you're uncertain, upload the ATS version to the portal and attach the styled version to any direct email</li>
</ul>

<h2>Keyword Matching</h2>
<p>Most ATS systems score resumes by keyword frequency and match against required/preferred skills in the JD. The competency cells and bullet rewrites are the primary mechanism for this. Key principle: if the JD uses a specific term, use that exact term — not a synonym.</p>
<table>
  <tr><th>JD Term</th><th>Don't Write</th><th>Write</th></tr>
  <tr><td>"HL7 FHIR"</td><td>"healthcare data standards"</td><td>"HL7 FHIR"</td></tr>
  <tr><td>"Salesforce CRM"</td><td>"CRM platforms"</td><td>"Salesforce"</td></tr>
  <tr><td>"RESTful APIs"</td><td>"web services"</td><td>"RESTful APIs"</td></tr>
</table>

<h2>Section Headers</h2>
<p>ATS parsers look for standard section header names. The ATS resume uses: <em>Professional Summary, Core Competencies, Professional Experience, Education, Certifications.</em> Avoid creative headers like "My Story" or "What I Bring."</p>

<h2>File Format</h2>
<p>Both resumes are produced as <code>.docx</code>. Most modern ATS systems handle <code>.docx</code> well. Avoid <code>.pdf</code> for ATS submissions unless the application explicitly accepts it — some older ATS systems struggle with PDF text extraction.</p>

<h2>What ATS Systems Don't Check</h2>
<ul>
  <li>Design and visual formatting — the ATS doesn't see the two-column layout</li>
  <li>Image content — logos, photos, signature images are invisible to parsers</li>
  <li>Text inside text boxes — this is why the ATS resume eliminates them</li>
</ul>

<h2>The Web App</h2>
<p>The web app is deployed at <a href="https://job-apply-corey.fly.dev/" target="_blank">job-apply-corey.fly.dev</a> on Fly.io. It provides a browser interface for both the run workflow and the interview prep workflow.</p>

<h2>How Progress Streams</h2>
<p>The run and prep workflows stream progress via Server-Sent Events (SSE). The client opens an <code>EventSource</code> connection after the run is initiated. Each step of the workflow emits a progress event that updates the UI in real time.</p>

<h2>Machine Pinning</h2>
<p>Because SSE state is in-memory (not stored in a database), all events for a given run must be handled by the same Fly machine. The workflow:</p>
<ol>
  <li><code>POST /api/run</code> returns a <code>machine_id</code></li>
  <li>The client sets a <code>fly-force-instance-id</code> cookie with that machine ID</li>
  <li>All subsequent requests (including the EventSource) are routed to the same machine</li>
</ol>
<p>This is why the web machine stays scaled to 1 — SSE across multiple machines without shared state would lose events.</p>

<h2>Interview Prep</h2>
<p>The prep workflow (<code>POST /api/prep</code>) generates role-specific interview prep materials — likely questions, stories to prepare, and company research. It follows the same SSE streaming pattern as the run workflow.</p>

<h2>Authentication</h2>
<p>The web app requires login. User accounts are managed via the admin panel at <code>/admin.html</code>. The API uses token-based auth with the token stored in <code>localStorage</code>.</p>

      readTime: '4 min',
      body: `
<h2>What Are Webhooks?</h2>
<p>Webhooks let you push job application events to any external URL in real time — a Slack channel, an MS Teams room, a Zapier zap, a custom API endpoint, or any HTTP receiver. Every subscribed event fires an HTTP POST within seconds.</p>

<h2>How They Work</h2>
<ol>
  <li>An action occurs in the app (run completed, application status changed, user logged in, etc.)</li>
  <li>The event is dispatched asynchronously in a background thread — no blocking of the main request</li>
  <li>Each webhook whose subscribed events include the action receives a POST with a JSON payload</li>
  <li>The last 25 deliveries per webhook are stored and visible in the Admin → Webhooks tab</li>
</ol>

<h2>HMAC Signing</h2>
<p>If you set a <strong>Secret</strong> on a webhook, every delivery includes an <code>X-Hub-Signature-256</code> header (same format as GitHub webhooks):</p>
<pre><code>X-Hub-Signature-256: sha256=&lt;hex-digest&gt;</code></pre>
<p>The digest is HMAC-SHA256 of the raw request body using your secret as the key. Verify it in your receiver to confirm the request came from this app and wasn't tampered with.</p>

<h2>SSRF Protection</h2>
<p>Webhook URLs are validated at delivery time against a private-network blocklist (RFC 1918, loopback, link-local). URLs that resolve to private addresses are rejected — this prevents DNS-rebinding attacks where a public hostname resolves to an internal address.</p>

<h2>Delivery Log</h2>
<p>Each webhook stores its 25 most recent delivery attempts in the Admin panel, including HTTP status, response body (truncated), latency, and timestamp. Use this to debug failed deliveries without needing an external logging tool.</p>
      `

<h2>Choosing a Format</h2>

<h2>Slack Incoming Webhook</h2>

<h2>MS Teams MessageCard</h2>
<p>Uses the legacy MessageCard format compatible with Teams Incoming Webhooks. Point the URL at a Teams connector webhook URL.</p>

  "summary":     "run_completed",

<p>Grafana Loki push API format. Useful for shipping events directly into a Loki log stream for dashboards and alerting.</p>

    {
      id: 'ts-zero-match',
      category: 'admin',
      title: 'Replacement Returns 0 Matches',
      snippet: 'What to do when a Python string replacement fails silently — debugging the XML source.',
      readTime: '4 min',
      body: `
<h2>The Problem</h2>
<p>A <code>content.replace(old, new, 1)</code> call returns 0 replacements, meaning the <code>old</code> string was not found in the XML. The document ships with unedited content.</p>

<h2>Root Cause — Almost Always</h2>
<p>The <code>old</code> search string was derived from pandoc output rather than the raw XML. See <a href="#" onclick="showArticle('res-xml')">XML Editing — How It Works</a> for why pandoc output doesn't match the raw XML.</p>

<h2>Debugging Steps</h2>
<ol>
  <li><strong>Grep the raw XML</strong> for a substring you expect to be present:
    <pre><code>grep -n "text you expect" unpacked/word/document.xml</code></pre>
  </li>
  <li>If grep finds a match, the full string just has a different form than expected. Look at what's actually there — it may have an XML entity (<code>&amp;amp;</code>), a smart quote (<code>&amp;#8217;</code>), or a line break between runs (<code>&lt;w:br/&gt;</code>).</li>
  <li>If grep finds no match at all, the text lives in a different location — check if it's in a text box (<code>mc:AlternateContent</code>), header, or footer rather than <code>document.xml</code>.</li>
</ol>

<h2>XML Entities to Watch</h2>
<table>
  <tr><th>Visible character</th><th>XML entity in raw file</th></tr>
  <tr><td>&amp;</td><td><code>&amp;amp;</code></td></tr>
  <tr><td>'</td><td><code>&amp;#8217;</code> or <code>&amp;apos;</code></td></tr>
  <tr><td>"</td><td><code>&amp;#8220;</code> / <code>&amp;#8221;</code></td></tr>
  <tr><td>—</td><td><code>&amp;#8212;</code> or literal <code>&#x2014;</code></td></tr>
</table>

<h2>Text Split Across Runs</h2>
<p>Word XML sometimes splits text across multiple <code>&lt;w:r&gt;</code> runs with formatting markup in between. If you're searching for a phrase and only part of it appears in any single <code>&lt;w:t&gt;</code> element, you'll need to find a search string that fits within one run — or restructure the search to target surrounding context.</p>
      `
    },
    {
      id: 'ts-validation',
      category: 'admin',
      title: 'Pack Validation Failures',
      snippet: 'How to interpret validation errors from the pack script and the most common causes.',
      readTime: '3 min',
      body: `
<h2>The Validation Step</h2>
<p>After packing, <code>scripts/office/pack.py</code> runs a validation pass against the output file and the original master. A successful pack prints:</p>
<pre><code>All validations PASSED</code></pre>
<p>If validation fails, the script prints the specific error before exiting. The run must not continue until validation passes.</p>

<h2>Common Failure: Malformed XML</h2>
<p>If a Python replacement introduced a literal <code>&lt;</code>, <code>&gt;</code>, or <code>&amp;</code> character (rather than using the XML entity), the resulting XML will fail to parse.</p>
<p>Fix: use XML-safe entities in replacement strings:</p>
<ul>
  <li><code>&amp;</code> → <code>&amp;amp;</code> in the XML text</li>
  <li><code>&lt;</code> → <code>&amp;lt;</code></li>
  <li><code>&gt;</code> → <code>&amp;gt;</code></li>
</ul>

<h2>Common Failure: Content Type Mismatch</h2>
<p>If a file was accidentally deleted or renamed during the unpack/edit phase, the pack script may report a missing relationship or content type. Fix: unpack from master again and re-apply the edits cleanly.</p>

<h2>Common Failure: ZIP Structure</h2>
<p>The <code>pack.py</code> script must preserve the original ZIP structure — directory entries, file order, and compression method. If the pack script is replaced or modified, verify it doesn't create a flat ZIP that breaks Word's ability to open the file.</p>

<h2>The Safe Recovery Path</h2>
<ol>
  <li>Delete the <code>unpacked/</code> directory</li>
  <li>Re-run the unpack from master</li>
  <li>Re-apply all edits using the Python script</li>
  <li>Re-run the pack and validation</li>
</ol>
<p>Never try to patch a broken output <code>.docx</code> directly — always start from the unpack.</p>
      `
    },

python3 apply.py --job jobs/job.txt --company "Test" --role "Test"</code></pre>

/* ─────────────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────────────── */
let currentView = 'home'; // 'home' | 'category' | 'article' | 'search'
let currentCat  = null;
let currentArt  = null;

/* ─────────────────────────────────────────────────────────────
   Boot
───────────────────────────────────────────────────────────── */
let _isAdmin = false;

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) {
      const me = await res.json();
      _isAdmin = me.role === 'admin';
    }
  } catch (_) {}

  // Try to load KB from API; fall back to hardcoded KB const if empty or unavailable
  try {
    const res = await fetch('/api/kb/articles', { credentials: 'include' });
    if (res.ok) {
      const data = await res.json();
      if (data.articles && data.articles.length > 0) {
        KB.articles   = data.articles;
        KB.categories = data.categories || KB.categories;
      }
    }
  } catch (_) {}

  buildHomeCards();
  setupSearch();
  setupTheme();

  // Deep-link via hash
  const hash = location.hash.slice(1);
  if (hash) {
    const art = KB.articles.find(a => a.id === hash);
    if (art) { showArticle(hash); return; }
    const cat = KB.categories.find(c => c.id === hash);
    if (cat) { showCategory(hash); return; }
  }
});

/* ─────────────────────────────────────────────────────────────
   Home
───────────────────────────────────────────────────────────── */
function buildHomeCards() {
  const el = document.getElementById('catCards');
  KB.categories.filter(cat => !cat.adminOnly || _isAdmin).forEach(cat => {
    const count = KB.articles.filter(a => a.category === cat.id).length;
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML = `
      <div class="cat-card-icon">${cat.icon}</div>
      <div class="cat-card-title">${cat.label}</div>
      <div class="cat-card-count">${count} article${count !== 1 ? 's' : ''}</div>
    `;
    card.onclick = () => showCategory(cat.id);
    el.appendChild(card);
  });
}

function showHome() {
  hideAll();
  document.getElementById('homeView').classList.add('visible');
  location.hash = '';
  currentView = 'home';
}

/* ─────────────────────────────────────────────────────────────
   Category
───────────────────────────────────────────────────────────── */
function showCategory(catId) {
  const cat = KB.categories.find(c => c.id === catId);
  if (!cat || (cat.adminOnly && !_isAdmin)) return;
  const articles = KB.articles.filter(a => a.category === catId);

  document.getElementById('catViewTitle').textContent = `${cat.icon}  ${cat.label}`;
  document.getElementById('catViewDesc').textContent  = cat.desc;

  const grid = document.getElementById('articleGrid');
  grid.innerHTML = '';
  articles.forEach(art => {
    const card = document.createElement('div');
    card.className = 'article-card';
    card.innerHTML = `
      <div class="article-card-title">${art.title}</div>
      <p class="article-card-snippet">${art.snippet}</p>
    `;
    card.onclick = () => showArticle(art.id);
    grid.appendChild(card);
  });

  hideAll();
  document.getElementById('categoryView').classList.add('visible');
  location.hash = catId;
  currentCat = catId;
  currentView = 'category';
}

/* ─────────────────────────────────────────────────────────────
   Article
───────────────────────────────────────────────────────────── */
function showArticle(artId) {
  const art = KB.articles.find(a => a.id === artId);
  if (!art) return;
  const cat = KB.categories.find(c => c.id === art.category);
  if (cat?.adminOnly && !_isAdmin) return;

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = `
    <button onclick="showHome()">All Categories</button>
    <span>›</span>
    <button onclick="showCategory('${cat.id}')">${cat.label}</button>
    <span>›</span>
    <span>${art.title}</span>
  `;

  document.getElementById('articleTitle').textContent = art.title;
  document.getElementById('articleMeta').innerHTML    = `<span>${cat.label}</span><span>${art.readTime} read</span>`;
  document.getElementById('articleBody').innerHTML    = art.body;

  hideAll();
  document.getElementById('articleView').classList.add('visible');
  location.hash = artId;
  currentArt = artId;
  currentView = 'article';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─────────────────────────────────────────────────────────────
   Search
───────────────────────────────────────────────────────────── */
function setupSearch() {
  const input = document.getElementById('globalSearch');
  let debounce;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => runSearch(input.value.trim()), 150);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { input.value = ''; runSearch(''); }
  });
}

function runSearch(q) {
  if (!q) {
    // Restore previous view
    hideAll();
    document.getElementById('searchResults').classList.remove('visible');
    if (currentView === 'article') { showArticle(currentArt); return; }
    if (currentView === 'category') { showCategory(currentCat); return; }
    showHome();
    return;
  }

  const ql = q.toLowerCase();
  const visibleArticles = KB.articles.filter(a => {
    const cat = KB.categories.find(c => c.id === a.category);
    return !cat?.adminOnly || _isAdmin;
  });
  const matches = visibleArticles.filter(a =>
    a.title.toLowerCase().includes(ql) ||
    a.snippet.toLowerCase().includes(ql) ||
    stripHtml(a.body).toLowerCase().includes(ql)
  );

  const list = document.getElementById('searchList');
  const meta = document.getElementById('searchMeta');
  list.innerHTML = '';
  meta.textContent = matches.length
    ? `${matches.length} result${matches.length !== 1 ? 's' : ''} for "${q}"`
    : '';

  if (!matches.length) {
    list.innerHTML = `<div class="no-results">No articles found for "<strong>${escHtml(q)}</strong>"</div>`;
  } else {
    const cat = id => KB.categories.find(c => c.id === id);
    matches.forEach(art => {
      const item = document.createElement('div');
      item.className = 'result-item';
      const snippet = highlight(art.snippet, q);
      item.innerHTML = `
        <div class="result-cat">${cat(art.category)?.icon} ${cat(art.category)?.label}</div>
        <div class="result-title">${highlight(art.title, q)}</div>
        <div class="result-snippet">${snippet}</div>
      `;
      item.onclick = () => {
        document.getElementById('globalSearch').value = '';
        showArticle(art.id);
      };
      list.appendChild(item);
    });
  }

  hideAll();
  document.getElementById('searchResults').classList.add('visible');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp(`(${escRe(q)})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

function stripHtml(h) { return h.replace(/<[^>]+>/g, ' '); }
function escHtml(s)   { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRe(s)     { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

/* ─────────────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────────────── */
function hideAll() {
  document.getElementById('searchResults').classList.remove('visible');
  document.getElementById('homeView').classList.remove('visible');
  document.getElementById('categoryView').classList.remove('visible');
  document.getElementById('articleView').classList.remove('visible');
}

/* ─────────────────────────────────────────────────────────────
   Theme
───────────────────────────────────────────────────────────── */
function setupTheme() {
  const btn  = document.getElementById('themeToggle');
  const setT = t => {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    btn.textContent = t === 'dark' ? '☀' : '🌙';
  };
  const cur = localStorage.getItem('theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setT(cur);
  btn.onclick = () => setT(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// Allow sidebar buttons to link to articles from article bodies
window.showArticle  = showArticle;
window.showCategory = showCategory;
window.showHome     = showHome;
</script>
