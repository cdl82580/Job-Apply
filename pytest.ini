[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -v
    --tb=short
    -p no:warnings

# Run only unit/API tests by default (exclude UI tests which need credentials)
# To include UI tests: pytest tests/ui/ --base-url=https://job-apply-corey.fly.dev
collect_ignore_glob = tests/ui/*

[tool:pytest]
markers =
    ui: marks tests as UI/browser tests (deselect with '-m "not ui"')
