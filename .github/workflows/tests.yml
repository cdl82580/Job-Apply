name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit & API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-test.txt

      - run: pytest tests/ --ignore=tests/ui -v

  ui:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-test.txt

      - run: playwright install --with-deps chromium

      - name: Run UI tests
        env:
          UI_BASE_URL: https://apply.cdlav.us
          UI_TEST_EMAIL: ${{ secrets.UI_TEST_EMAIL }}
          UI_TEST_PASSWORD: ${{ secrets.UI_TEST_PASSWORD }}
          UI_ADMIN_EMAIL: ${{ secrets.UI_ADMIN_EMAIL }}
          UI_ADMIN_PASSWORD: ${{ secrets.UI_ADMIN_PASSWORD }}
        run: pytest tests/ui/ -v --reruns 2 --reruns-delay 5

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
